<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM</title>
</head>
<body>
    <form action="https://www.samdu.uz/en">
        <h3>Ismingizni kiriting</h3>
        <input type="text" placeholder="Ismni kiriting">
        <h3>Yoshingiz</h3>
        <input type="number" placeholder="Nomer kiriting">
        <h3>Emailingizni kiriting</h3>
        <input type="email" placeholder="Email kriiting">
        <h3>Parolni kiriting</h3>
        <input type="password" placeholder="Parolni kriiting">
        <h3>Tugulgan kuningizni kiriting</h3>
        <input type="date">
        <h3>Fayl kiriting</h3>
        <input type="file" multiple>
        <h3>Jinsingizni kriiting</h3>
        <select name="" id="">Jins</select>
        <option value="">Erkak</option>
        <option value="">Ayol</option>

        <button class="yubor">Yuborish</button>



    </form>
    <style>

        form{
            display: center;
            flex-direction: column;
            gap: 20px;
            width: 300px;
            margin: 0 auto;
        }
        .yubor{
            background-color: aqua;
        }
    </style>


    
</body>
</html>
